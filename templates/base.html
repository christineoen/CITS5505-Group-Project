<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SitBuddy{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
    .nav-link {
        color: rgba(255,255,255,0.85);
    }

    .nav-link:hover {
        color: #ffffff;
    }

    .nav-link.active {
        color: #ffffff;
        border-bottom: 2px solid white;
    }
</style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container position-relative">
            <a class="navbar-brand fw-bold position-absolute start-0" href="{{ url_for('main.index') }}">SitBuddy</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- <div class="collapse navbar-collapse" id="navMenu"> -->
                <ul class="navbar-nav mx-auto gap-4">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold fs-5" href="{{ url_for('main.index') }}">Home</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link fw-semibold fs-5" href="{{ url_for('main.booking') }}">Booking</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link fw-semibold fs-5" href="{{ url_for('main.messages') }}">Messages</a>
                    </li>
                </ul>
                {% if current_user.is_authenticated %}
                <div class="dropdown position-absolute end-0">
                    <button class="btn p-0 border-0 bg-transparent dropdown-toggle"
                            type="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        <img src="https://via.placeholder.com/42"
                             alt="Profile"
                             class="rounded-circle border border-white"
                             width="42"
                             height="42">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text text-muted small">{{ current_user.username }}</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#">Settings</a></li>
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}">Logout</a></li>
                    </ul>
                </div>
                {% else %}
                <div class="d-flex gap-2 position-absolute end-0">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-light btn-sm fw-semibold">Log In</a>
                    <a href="{{ url_for('auth.signup') }}" class="btn btn-light btn-sm fw-semibold text-primary">Sign Up</a>
                </div>
                {% endif %}

            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 border-top mt-auto">
        <small>&copy; 2026 SitBuddy</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
