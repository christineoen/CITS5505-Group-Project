{% extends "base.html" %}

{% block title %}Messages - SitBuddy{% endblock %}

{% block content %}
<div class="row h-100">
    <!-- Left side: Conversation list -->
    <div class="col-md-4 border-end">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Messages</h4>
        </div>
        
        <div id="conversations-list">
            <div class="text-center text-muted py-5">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Loading conversations...</p>
            </div>
        </div>
    </div>

    <!-- Right side: Message details -->
    <div class="col-md-8">
        <div id="no-conversation-selected" class="text-center text-muted py-5">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-chat-dots mb-3" viewBox="0 0 16 16">
                <path d="M5 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0m4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0m3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
                <path d="m2.165 15.803.02-.004c1.83-.363 2.948-.842 3.468-1.105A9 9 0 0 0 8 15c4.418 0 8-3.134 8-7s-3.582-7-8-7-8 3.134-8 7c0 1.76.743 3.37 1.97 4.6a10.4 10.4 0 0 1-.524 2.318l-.003.011a11 11 0 0 1-.244.637c-.079.186.074.394.273.362a22 22 0 0 0 .693-.125m.8-3.108a1 1 0 0 0-.287-.801C1.618 10.83 1 9.468 1 8c0-3.192 3.004-6 7-6s7 2.808 7 6-3.004 6-7 6a8 8 0 0 1-2.088-.272 1 1 0 0 0-.711.074c-.387.196-1.24.57-2.634.893a11 11 0 0 0 .398-2"/>
            </svg>
            <h5>Select a conversation</h5>
            <p>Choose a conversation from the list to view messages</p>
        </div>

        <div id="conversation-view" class="d-none">
            <!-- Conversation header -->
            <div class="border-bottom pb-3 mb-3">
                <div class="d-flex align-items-center">
                    <div class="avatar-circle bg-primary me-3" style="width:48px;height:48px;font-size:1.2rem;">
                        <span id="other-user-initial"></span>
                    </div>
                    <div class="flex-grow-1">
                        <h5 class="mb-0" id="other-user-name"></h5>
                        <small class="text-muted">
                            <span id="booking-info"></span>
                            <span class="badge ms-2" id="booking-status-badge"></span>
                        </small>
                    </div>
                    <div id="booking-actions" class="d-none">
                        <button class="btn btn-success btn-sm me-2" onclick="updateBookingStatus('accepted')">Accept</button>
                        <button class="btn btn-danger btn-sm" onclick="updateBookingStatus('rejected')">Reject</button>
                    </div>
                </div>
            </div>

            <!-- Message list -->
            <div id="messages-container" style="height: 400px; overflow-y: auto;" class="mb-3">
                <!-- Messages will be dynamically loaded via JavaScript -->
            </div>

            <!-- Send message form -->
            <div class="border-top pt-3">
                <form id="send-message-form" class="d-flex gap-2">
                    <input type="text" id="message-input" class="form-control" placeholder="Type a message..." required>
                    <button type="submit" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-send" viewBox="0 0 16 16">
                            <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z"/>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/messages.js') }}"></script>
{% endblock %}
